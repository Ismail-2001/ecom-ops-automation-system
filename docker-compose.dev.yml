# ── OpsIQ — Lightweight Local Development ───────────────────
# Usage: docker compose -f docker-compose.dev.yml up
# No monitoring, no nginx — just DB + Redis + API + Frontend

services:
  # ── PostgreSQL with pgvector ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opsiq-dev-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_ops
    ports:
      - "5432:5432"
    volumes:
      - dev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dev
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opsiq-dev-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - dev
    restart: unless-stopped

  # ── Backend API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: opsiq-dev-api
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn ecommerce_ops.api.app:app --reload --host 0.0.0.0 --port 8000 --log-level debug"
    environment:
      ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ecommerce_ops
      REDIS_URL: redis://redis:6379/0
      SHADOW_MODE: "true"
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./ecommerce_ops:/app/ecommerce_ops
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - dev
    restart: unless-stopped

  # ── Frontend (Next.js) ───────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: opsiq-dev-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - dev_frontend_node_modules:/app/node_modules
      - dev_frontend_next:/app/.next
    networks:
      - dev
    restart: unless-stopped

# ── Networks ────────────────────────────────────────────────
networks:
  dev:
    driver: bridge
    name: opsiq-dev

# ── Volumes ─────────────────────────────────────────────────
volumes:
  dev_postgres:
    name: opsiq-dev-postgres
  dev_frontend_node_modules:
    name: opsiq-dev-frontend-nm
  dev_frontend_next:
    name: opsiq-dev-frontend-next
