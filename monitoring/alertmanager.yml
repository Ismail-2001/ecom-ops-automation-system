# ── OpsIQ — Alertmanager Configuration ─────────────────────
# Routes alerts to Slack, Email, or webhook

global:
  resolve_timeout: 5m
  slack_api_url: "${SLACK_WEBHOOK_URL:-}"
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "opsiq-alerts@example.com"
  smtp_auth_username: ""
  smtp_auth_password: ""

# ── Alert Routes ───────────────────────────────────────────
route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'

  routes:
    # Critical alerts → immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 5s
      repeat_interval: 5m

    # Warning alerts → less frequent
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 30m

    # Infrastructure alerts → dedicated channel
    - match:
        alertname: '(RedisDown|PostgresDown)'
      receiver: 'infra-alerts'
      repeat_interval: 10m

# ── Receivers ──────────────────────────────────────────────
receivers:
  - name: 'default'
    # No-op — just silences alerts

  - name: 'critical-alerts'
    slack_configs:
      - channel: '#opsiq-critical'
        send_resolved: true
        title: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
    email_configs:
      - to: 'ops@example.com'
        send_resolved: true
        subject: '🔴 CRITICAL: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Instance: {{ .Labels.instance }}
          {{ end }}

  - name: 'warning-alerts'
    slack_configs:
      - channel: '#opsiq-warnings'
        send_resolved: true
        title: '🟡 WARNING: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          {{ end }}

  - name: 'infra-alerts'
    slack_configs:
      - channel: '#opsiq-infra'
        send_resolved: true
        title: '🏗️ INFRA: {{ .GroupLabels.alertname }}'
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}

# ── Inhibition Rules ──────────────────────────────────────
# Silence lower severity when critical is firing
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']
